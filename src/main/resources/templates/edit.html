<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Edit Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(to right, #74ebd5, #ACB6E5);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        border-radius: 15px;
        box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
    }

    .card-header {
        background: #198754;
        color: white;
        border-radius: 15px 15px 0 0;
        text-align: center;
    }

    .form-control {
        border-radius: 10px;
    }

    .btn-custom {
        width: 100%;
        border-radius: 10px;
        font-size: 18px;
    }
</style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card">
                <div class="card-header">
                    <h3><i class="bi bi-pencil-square"></i> Edit Student</h3>
                </div>

                <div class="card-body">

                    <form th:action="@{/updateStudent}" method="post">

                        <input type="hidden" name="id" th:value="${student.id}">

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" th:value="${student.name}" 
                                   class="form-control" placeholder="Enter Name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" th:value="${student.email}" 
                                   class="form-control" placeholder="Enter Email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Course</label>
                            <input type="text" name="course" th:value="${student.course}" 
                                   class="form-control" placeholder="Enter Course" required>
                        </div>

                        <button class="btn btn-success btn-custom">
                            <i class="bi bi-check-circle"></i> Update Student
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
