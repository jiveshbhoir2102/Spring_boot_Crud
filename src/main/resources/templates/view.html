<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Student List</h2>

    <!-- Search form -->
    <form th:action="@{/search}" method="get" class="mb-3 d-flex">

        <input type="text" name="keyword"
               class="form-control me-2"
               placeholder="Search by Name / Email / Course" required>

        <button type="submit" class="btn btn-success">
            <i class="bi bi-search"></i> Search
        </button>

    </form>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-bordered table-hover table-striped text-center">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="s : ${students}">
                        <td th:text="${s.id}"></td>
                        <td th:text="${s.name}"></td>
                        <td th:text="${s.email}"></td>
                        <td th:text="${s.course}"></td>
                        <td>

                            <a th:href="@{/delete/{id}(id=${s.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure?');">
                               <i class="bi bi-trash"></i>
                            </a>

                            <a th:href="@{/edit/{id}(id=${s.id})}"
                               class="btn btn-primary btn-sm">
                               <i class="bi bi-pencil"></i>
                            </a>

                        </td>
                    </tr>
                </tbody>
            </table>

        
            <div class="text-center mt-3" th:if="${totalPages != null}">

                <a th:if="${currentPage > 0}"
                   th:href="@{/viewStudents(page=${currentPage-1})}"
                   class="btn btn-secondary">Previous</a>

                <span class="mx-2">
                    Page [[${currentPage+1}]] of [[${totalPages}]]
                </span>

                <a th:if="${currentPage < totalPages-1}"
                   th:href="@{/viewStudents(page=${currentPage+1})}"
                   class="btn btn-secondary">Next</a>

            </div>

        </div>
    </div>
</div>

</body>
</html>
